<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Tailwind Blue-500 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- Tailwind Purple-500 -->
    </linearGradient>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect x="40" y="40" width="432" height="432" rx="120" fill="url(#bg)" filter="url(#drop)" />
  <text x="256" y="375" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="320" fill="#ffffff" text-anchor="middle" letter-spacing="-2">R</text>
</svg>
